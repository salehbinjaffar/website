<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Google Ads — Admin</title>
  <link rel="stylesheet" href="/public/css/admin.css">
</head>
<body>
  <div class="admin-wrap">
    <div class="admin-header">
      <h1>Google विज्ञापन (AdSense)</h1>
      <nav class="admin-nav">
        <a href="/admin">डैशबोर्ड</a>
        <a href="/privacy" target="_blank">गोपनीयता पेज</a>
        <a href="/admin/logout">लॉगआउट</a>
      </nav>
    </div>
    {{MESSAGE}}
    <form method="post" action="/admin/ads" class="card">
      <p class="hint">Google AdSense से <code>&lt;script&gt;</code> और विज्ञापन <code>&lt;ins&gt;</code> कोड यहाँ पेस्ट करें।</p>
      <label>Head में स्क्रिप्ट (AdSense auto ads / loader)</label>
      <textarea name="headScript" rows="6" placeholder="<script async src='https://pagead2.googlesyndication.com/...'></script>">{{HEAD_SCRIPT}}</textarea>
      <label>बॉडी विज्ञापन स्लॉट (प्रदर्शन इकाई)</label>
      <textarea name="bodySlot" rows="6" placeholder="<ins class='adsbygoogle' ...></ins><script>...</script>">{{BODY_SLOT}}</textarea>
      <h3>कहाँ दिखाएं</h3>
      <label><input type="checkbox" name="showOnHome" {{SHOW_HOME}}> होमपेज</label>
      <label><input type="checkbox" name="showOnArticle" {{SHOW_ARTICLE}}> खबर लेख</label>
      <label><input type="checkbox" name="showOnPrivacy" {{SHOW_PRIVACY}}> गोपनीयता पेज</label>
      <label><input type="checkbox" name="showOnContact" {{SHOW_CONTACT}}> संपर्क पेज</label>
      <button type="submit">सेव करें</button>
    </form>
  </div>
</body>
</html>
