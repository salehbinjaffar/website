<article class="single-article article-layout">
  <a class="category-badge" href="{{CATEGORY_URL}}">{{CATEGORY}}</a>
  <h1 class="article-title">{{TITLE}}</h1>
  <p class="article-meta">{{DATE}}</p>
  {{SHARE_BUTTONS}}
  <img class="article-featured" src="{{IMAGE}}" alt="{{TITLE}}">
  <div class="entry-content">{{BODY}}</div>
  <p><a href="/">← सभी खबरें</a></p>
</article>
